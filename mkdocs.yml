site_name: OSHConnect-Python
site_description: Python library for the OGC API – Connected Systems (Parts 1, 2, and 3 Pub/Sub)
site_author: Ian Patterson
repo_url: https://github.com/Botts-Innovative-Research/OSHConnect-Python
edit_uri: ""

docs_dir: docs/markdown
site_dir: docs/build/html

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            show_source: false
            show_signature_annotations: true
            separate_signature: true
            docstring_style: sphinx
            members_order: source
            filters: ["!^_"]
            merge_init_into_class: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Tutorial: tutorial.md
  - API Reference: api.md